name: procureneg-gym
version: 1.0

entrypoint: server.app:main

endpoints:
  reset:
    method: POST
    path: /reset

  step:
    method: POST
    path: /step

  state:
    method: GET
    path: /state

  health:
    method: GET
    path: /health

  metadata:
    method: GET
    path: /metadata

  schema:
    method: GET
    path: /schema
